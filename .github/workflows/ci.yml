name: CI exemplo

on:
  push:
   branches:
   - main

jobs:

  validar:
    runs-on: ubuntu-latest
    steps:
      - name: Validar código
        run: echo "Código validado"
 build:
  runs-on: ubuntu-latest
  needs: validar
  steps:
    - name: Mostrar mensagem secreta
      run: echo "Mensagem: ${{ secrets.MENSAGEM_SECRETA }}"
